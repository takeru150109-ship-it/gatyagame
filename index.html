<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>タイクーンゲーム 完全版</title>

<style>

body{
margin:0;
background:#12121a;
color:white;
font-family:sans-serif;
text-align:center;
overflow-x:hidden;
}

#titleScreen{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:linear-gradient(#1d1d30,#090910);
}

#gameScreen{
display:none;
padding-bottom:100px;
}

.topbar{
background:#1d1d30;
padding:10px;
position:sticky;
top:0;
z-index:100;
}

button{
border:none;
border-radius:10px;
padding:10px;
background:#4b6cff;
color:white;
font-weight:bold;
margin:3px;
cursor:pointer;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(110px,1fr));
gap:10px;
padding:10px;
}

.card{
background:#2a2a40;
border-radius:14px;
padding:8px;
font-size:12px;
}

.N{border:2px solid gray;}
.R{border:2px solid cyan;}
.SR{
border:2px solid violet;
box-shadow:0 0 10px violet;
}
.LR{
border:2px solid gold;
box-shadow:0 0 10px gold;
}
.SECRET{
border:2px solid red;
box-shadow:0 0 15px red;
animation:glow 1s infinite alternate;
}

@keyframes glow{
from{transform:scale(1);}
to{transform:scale(1.03);}
}

.lock{
opacity:0.25;
filter:grayscale(100%);
}

img{
width:80px;
height:80px;
object-fit:contain;
background:white;
border-radius:10px;
}

.tapBtn{
font-size:28px;
padding:20px 40px;
margin-top:20px;
}

#menu{
position:fixed;
bottom:0;
width:100%;
display:flex;
background:#1a1a28;
z-index:999;
overflow-x:auto;
}

#menu button{
flex:1;
font-size:10px;
border-radius:0;
margin:0;
padding:12px 4px;
}

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#101018;
display:none;
flex-direction:column;
overflow-y:auto;
z-index:9999;
padding-bottom:100px;
}

.closeBtn{
margin:20px;
}

#effect{
position:fixed;
left:50%;
top:50%;
transform:translate(-50%,-50%);
font-size:32px;
font-weight:bold;
color:gold;
pointer-events:none;
opacity:0;
transition:0.3s;
z-index:99999;
}

.secretText{
color:red;
font-weight:bold;
}

input,select{
padding:8px;
border-radius:8px;
border:none;
margin:5px;
}

</style>
</head>

<body>

<!-- タイトル -->
<div id="titleScreen">

<h1>タイクーンゲーム</h1>

<button onclick="newGame()">
最初から
</button>

<button onclick="continueGame()">
続きから
</button>

<br><br>

<input type="password" id="adminCode" placeholder="管理者コード">

<button onclick="openAdmin()">
管理者
</button>

</div>

<!-- ゲーム -->
<div id="gameScreen">

<div class="topbar">

💰 コイン:
<span id="coins">0</span>

<br>

⭐ RP:
<span id="rp">0</span>

<br>

<span id="info"></span>

</div>

<div id="effect"></div>

<button class="tapBtn" onclick="tap()">
TAP!!
</button>

<h2>所持キャラ</h2>

<div id="cards" class="grid"></div>

<!-- メニュー -->
<div id="menu">

<button onclick="gacha()">ガチャ</button>

<button onclick="gacha10()">10連</button>

<button onclick="gacha100()">100連</button>

<button onclick="openParty()">編成</button>

<button onclick="openCollection()">図鑑</button>

<button onclick="openRP()">RP</button>

<button onclick="openBoss()">ボス</button>

<button onclick="openAchievement()">実績</button>

<button onclick="openEvolution()">進化</button>

<button onclick="saveGame()">セーブ</button>

<button onclick="rebirth()">転生</button>

</div>

</div>

<!-- 編成 -->
<div id="partyUI" class="overlay">

<h2>パーティ編成</h2>

<div id="partyNow"></div>

<div id="partyList" class="grid"></div>

<button class="closeBtn" onclick="closeParty()">
閉じる
</button>

</div>

<!-- 図鑑 -->
<div id="collectionUI" class="overlay">

<h2>図鑑</h2>

<p class="secretText">
SECRET以外をコンプすると
創造神が0.0001%で出現
</p>

<div id="collectionGrid" class="grid"></div>

<button class="closeBtn" onclick="closeCollection()">
閉じる
</button>

</div>

<!-- RP -->
<div id="rpUI" class="overlay">

<h2>RPショップ</h2>

<p>
RP:
<span id="rpValue"></span>
</p>

<div id="rpShop"></div>

<button class="closeBtn" onclick="closeRP()">
閉じる
</button>

</div>

<!-- ボス -->
<div id="bossUI" class="overlay">

<h2>ボス戦</h2>

<div class="card">

<h3 id="bossName"></h3>

<div style="background:#333;height:25px;border-radius:20px;overflow:hidden;">

<div id="bossBarInner"
style="
background:red;
height:100%;
width:100%;
transition:0.3s;
"></div>

</div>

<p>

HP:
<span id="bossHP"></span>
/
<span id="bossMaxHP"></span>

</p>

<button onclick="attackBoss()">
攻撃
</button>

</div>

<button class="closeBtn" onclick="closeBoss()">
閉じる
</button>

</div>

<!-- 実績 -->
<div id="achievementUI" class="overlay">

<h2>実績</h2>

<div id="achievementList"></div>

<button class="closeBtn" onclick="closeAchievement()">
閉じる
</button>

</div>

<!-- 進化 -->
<div id="evolutionUI" class="overlay">

<h2>進化</h2>

<div id="evolutionList" class="grid"></div>

<button class="closeBtn" onclick="closeEvolution()">
閉じる
</button>

</div>

<!-- キャラ詳細 -->
<div id="detailUI" class="overlay">

<h2>キャラ詳細</h2>

<div id="detailContent"></div>

<button class="closeBtn" onclick="closeDetail()">
閉じる
</button>

</div>

<!-- 管理者 -->
<div id="adminUI" class="overlay">

<h2>管理者パネル</h2>

<div class="card">

<h3>お金追加</h3>

<input type="number" id="addCoinValue">

<button onclick="addCoinsAdmin()">
追加
</button>

</div>

<div class="card">

<h3>RP追加</h3>

<input type="number" id="addRPValue">

<button onclick="addRPAdmin()">
追加
</button>

</div>

<div class="card">

<h3>キャラ追加</h3>

<select id="adminCharSelect"></select>

<button onclick="giveCharAdmin()">
入手
</button>

</div>

<button onclick="closeAdmin()">
閉じる
</button>

</div>

<script>

// ====================
// 管理者
// ====================

const ADMIN_CODE="3335619";

// ====================
// データ
// ====================

let gameData={
coins:0,
rp:0,
chars:{},
collection:{},
party:[]
};

let rpUp={
click:0,
auto:0,
gacha:0
};

let tapCount=0;

let bossKills=0;

let achievementGet={};

// ====================
// キャラ
// ====================

const charList=[

// ====================
// N
// ====================

{name:"スライム",multi:1,rarity:"N",img:"images/slime.png"},
{name:"ベビースライム",multi:0.9,rarity:"N",img:"images/babyslime.png"},
{name:"ゴブリン",multi:1.2,rarity:"N",img:"images/goblin.png"},
{name:"コボルト",multi:1.3,rarity:"N",img:"images/kobold.png"},
{name:"ウルフ",multi:1.4,rarity:"N",img:"images/wolf.png"},
{name:"スケルトン",multi:1.5,rarity:"N",img:"images/skeleton.png"},
{name:"ゾンビ",multi:1.6,rarity:"N",img:"images/zombie.png"},
{name:"インプ",multi:1.7,rarity:"N",img:"images/imp.png"},
{name:"ゴーレム",multi:1.8,rarity:"N",img:"images/golem.png"},
{name:"リザードマン",multi:1.9,rarity:"N",img:"images/lizard.png"},

// ====================
// R
// ====================

{name:"ナイト",multi:2,rarity:"R",img:"images/knight.png"},
{name:"サムライ",multi:2.5,rarity:"R",img:"images/samurai.png"},
{name:"アーチャー",multi:2.2,rarity:"R",img:"images/archer.png"},
{name:"モンク",multi:2.3,rarity:"R",img:"images/monk.png"},
{name:"パラディン",multi:2.8,rarity:"R",img:"images/paladin.png"},
{name:"アサシン",multi:2.6,rarity:"R",img:"images/assassin.png"},
{name:"魔法剣士",multi:2.7,rarity:"R",img:"images/magicknight.png"},
{name:"レンジャー",multi:2.4,rarity:"R",img:"images/ranger.png"},

// ====================
// SR
// ====================

{name:"ドラゴン",multi:5,rarity:"SR",img:"images/dragon.png"},
{name:"フェニックス",multi:5.5,rarity:"SR",img:"images/phoenix.png"},
{name:"グリフォン",multi:5.2,rarity:"SR",img:"images/griffin.png"},
{name:"ユニコーン",multi:5.3,rarity:"SR",img:"images/unicorn.png"},
{name:"サイクロプス",multi:5.4,rarity:"SR",img:"images/cyclops.png"},
{name:"デーモン",multi:5.6,rarity:"SR",img:"images/demon.png"},

// ====================
// LR
// ====================

{name:"神龍",multi:10,rarity:"LR",img:"images/shinryu.png"},
{name:"終焉龍",multi:12,rarity:"LR",img:"images/enddragon.png"},
{name:"天空神",multi:11,rarity:"LR",img:"images/skygod.png"},
{name:"大天使",multi:10.5,rarity:"LR",img:"images/angel.png"},
{name:"魔王",multi:12.5,rarity:"LR",img:"images/darklord.png"},

// ====================
// SECRET
// ====================

{name:"虚無神",multi:30,rarity:"SECRET",img:"images/voidgod.png"},
{name:"時空龍",multi:40,rarity:"SECRET",img:"images/timedragon.png"},
{name:"深淵王",multi:50,rarity:"SECRET",img:"images/abyssking.png"},
{name:"創造神",multi:100,rarity:"SECRET",img:"images/creator.png"}

];

const rarityRates={
N:70,
R:20,
SR:7,
LR:2.9,
};

// ====================
// ボス
// ====================

const bossList=[

{name:"ゴブリン王",hp:1000,reward:500},

{name:"巨大スライム",hp:3000,reward:1500},

{name:"オーク将軍",hp:7000,reward:4000},

{name:"ドラゴン",hp:20000,reward:12000},

{name:"死神",hp:50000,reward:30000},

{name:"魔王",hp:100000,reward:70000},

{name:"終焉龍",hp:500000,reward:300000},

{name:"天界神",hp:2000000,reward:1000000},

{name:"虚無神",hp:10000000,reward:5000000},

{name:"創造神",hp:100000000,reward:50000000}

];

let bossIndex=0;

let bossData={

name:bossList[0].name,
hp:bossList[0].hp,
maxHp:bossList[0].hp,
reward:bossList[0].reward

};

// ====================
// 実績
// ====================

const achievements=[

{
id:"tap100",
name:"100タップ",
check:()=>tapCount>=100,
reward:5
},

{
id:"boss10",
name:"ボス10体撃破",
check:()=>bossKills>=10,
reward:20
},

{
id:"coin1m",
name:"100万コイン",
check:()=>gameData.coins>=1000000,
reward:50
}

];

// ====================
// 進化
// ====================

const evolutions=[

{
from:"スライム",
to:"キングスライム",
needLv:10,
img:"images/kingslime.png",
multi:5,
rarity:"R"
}

];

// ====================
// ゲーム開始
// ====================

function newGame(){

localStorage.removeItem("tycoonSave");

location.reload();

}

function continueGame(){

let save=
localStorage.getItem("tycoonSave");

if(save){

let data=JSON.parse(save);

gameData=data.gameData;
rpUp=data.rpUp;
bossKills=data.bossKills||0;
tapCount=data.tapCount||0;
achievementGet=data.achievementGet||{};

}

startGame();

}

function startGame(){

titleScreen.style.display="none";
gameScreen.style.display="block";

update();

}

// ====================
// セーブ
// ====================

function saveGame(){

localStorage.setItem(
"tycoonSave",

JSON.stringify({

gameData,
rpUp,
bossKills,
tapCount,
achievementGet

})

);

showEffect("セーブ完了");

}

// ====================
// エフェクト
// ====================

function showEffect(text){

effect.innerHTML=text;

effect.style.opacity="1";

setTimeout(()=>{
effect.style.opacity="0";
},500);

}

// ====================
// 倍率
// ====================

function getMulti(){

let m=1;

gameData.party.forEach(n=>{

let c=gameData.chars[n];

let d=charList.find(x=>x.name===n);

if(c){

m+=
d.multi*
(1+c.lv*0.2);

}

});

return m*(1+rpUp.click);

}

// ====================
// タップ
// ====================

function tap(){

tapCount++;

let gain=getMulti();

gameData.coins+=gain;

showEffect("+"+Math.floor(gain));

update();

}

// ====================
// ガチャ
// ====================

function randomChar(){

let complete=true;

charList.forEach(c=>{

if(c.rarity!=="SECRET"){

if(!gameData.collection[c.name]){

complete=false;

}

}

});

if(complete){

if(Math.random()*1000000<1){

return charList.find(
c=>c.name==="創造神"
);

}

}

let rand=Math.random()*100;

let sum=0;

for(let r in rarityRates){

sum+=rarityRates[r];

if(rand<sum){

let pool=
charList.filter(
c=>c.rarity===r
);

return pool[
Math.floor(
Math.random()*pool.length
)
];

}

}

}

// ====================
// キャラ追加
// ====================

function addChar(c){

if(!gameData.chars[c.name]){

gameData.chars[c.name]={
count:0,
lv:1,
exp:0
};

}

let data=gameData.chars[c.name];

data.count++;

data.exp++;

if(data.exp>=data.lv*5){

data.exp=0;

data.lv++;

showEffect(c.name+" LvUP!");

}

gameData.collection[c.name]=true;

showEffect(c.rarity+" "+c.name);

}

// ====================
// ガチャ
// ====================

function gacha(){

let cost=
Math.max(10,100-rpUp.gacha*5);

if(gameData.coins<cost)return;

gameData.coins-=cost;

addChar(randomChar());

update();

}

function gacha10(){

if(gameData.coins<1000)return;

gameData.coins-=1000;

for(let i=0;i<10;i++){

addChar(randomChar());

}

update();

}

function gacha100(){

if(gameData.coins<10000)return;

gameData.coins-=10000;

for(let i=0;i<100;i++){

addChar(randomChar());

}

update();

}

// ====================
// 編成
// ====================

function openParty(){

partyUI.style.display="flex";

renderParty();

}

function closeParty(){

partyUI.style.display="none";

}

function renderParty(){

partyNow.innerHTML=
"現在:"+gameData.party.join(" / ");

partyList.innerHTML="";

for(let n in gameData.chars){

let d=
charList.find(x=>x.name===n);

let data=
gameData.chars[n];

partyList.innerHTML+=`

<div class="card ${d.rarity}">

<img src="${d.img}">

<br>

${n}

<br>

Lv ${data.lv}

<br>

x${data.count}

<br>

<button onclick="addP('${n}')">
追加
</button>

<button onclick="removeP('${n}')">
外す
</button>

<button onclick="openDetail('${n}')">
詳細
</button>

</div>

`;

}

}

function addP(n){

if(gameData.party.length>=5)return;

if(!gameData.party.includes(n)){

gameData.party.push(n);

}

renderParty();

update();

}

function removeP(n){

gameData.party=
gameData.party.filter(
x=>x!==n
);

renderParty();

update();

}

// ====================
// 図鑑
// ====================

function openCollection(){

collectionUI.style.display="flex";

renderCollection();

}

function closeCollection(){

collectionUI.style.display="none";

}

function renderCollection(){

collectionGrid.innerHTML="";

charList.forEach(c=>{

let owned=
gameData.collection[c.name];

collectionGrid.innerHTML+=`

<div class="card ${c.rarity} ${owned?"":"lock"}">

<img src="${c.img}">

<br>

${owned?c.name:"？？？"}

</div>

`;

});

}

// ====================
// RP
// ====================

const shopList=[

{id:"click",name:"クリック強化",baseCost:1,maxLv:10},

{id:"auto",name:"自動収入",baseCost:2,maxLv:10},

{id:"gacha",name:"ガチャ割引",baseCost:3,maxLv:10}

];

function openRP(){

rpUI.style.display="flex";

renderShop();

}

function closeRP(){

rpUI.style.display="none";

}

function renderShop(){

rpValue.innerHTML=gameData.rp;

rpShop.innerHTML="";

shopList.forEach(s=>{

let lv=rpUp[s.id];

let cost=s.baseCost*(lv+1);

rpShop.innerHTML+=`

<div class="card">

${s.name}

<br>

Lv ${lv}/${s.maxLv}

<br>

必要RP:${cost}

<br>

<button onclick="buy('${s.id}')">

購入

</button>

</div>

`;

});

}

function buy(id){

let s=
shopList.find(x=>x.id===id);

let lv=rpUp[id];

let cost=s.baseCost*(lv+1);

if(gameData.rp<cost)return;

gameData.rp-=cost;

rpUp[id]++;

update();

renderShop();

}

// ====================
// ボス
// ====================

function openBoss(){

bossUI.style.display="flex";

renderBoss();

}

function closeBoss(){

bossUI.style.display="none";

}

function renderBoss(){

bossName.innerHTML=bossData.name;

bossHP.innerHTML=
Math.floor(bossData.hp);

bossMaxHP.innerHTML=
bossData.maxHp;

bossBarInner.style.width=
(bossData.hp/bossData.maxHp*100)+"%";

}

function attackBoss(){

let dmg=getMulti();

bossData.hp-=dmg;

if(bossData.hp<0){

bossData.hp=0;

}

showEffect("-"+Math.floor(dmg));

if(bossData.hp<=0){

gameData.coins+=bossData.reward;

bossKills++;

showEffect(
bossData.name+" 撃破!"
);

bossIndex++;

if(bossIndex>=bossList.length){

bossIndex=0;

}

let next=bossList[bossIndex];

bossData={

name:next.name,
hp:next.hp,
maxHp:next.hp,
reward:next.reward

};

}

renderBoss();

update();

}

// ====================
// 実績
// ====================

function openAchievement(){

achievementUI.style.display="flex";

renderAchievement();

}

function closeAchievement(){

achievementUI.style.display="none";

}

function renderAchievement(){

achievementList.innerHTML="";

achievements.forEach(a=>{

let clear=a.check();

let got=
achievementGet[a.id];

achievementList.innerHTML+=`

<div class="card">

${a.name}

<br>

報酬:${a.reward}RP

<br><br>

${
clear
?
(
got
?
"取得済"
:
`<button onclick="getAchievement('${a.id}')">
受け取る
</button>`
)
:
"未達成"
}

</div>

`;

});

}

function getAchievement(id){

let a=
achievements.find(
x=>x.id===id
);

if(!a.check())return;

if(achievementGet[id])return;

achievementGet[id]=true;

gameData.rp+=a.reward;

showEffect("実績達成!");

update();

renderAchievement();

}

// ====================
// 進化
// ====================

function openEvolution(){

evolutionUI.style.display="flex";

renderEvolution();

}

function closeEvolution(){

evolutionUI.style.display="none";

}

function renderEvolution(){

evolutionList.innerHTML="";

evolutions.forEach(e=>{

let data=
gameData.chars[e.from];

if(!data)return;

evolutionList.innerHTML+=`

<div class="card">

${e.from}

↓

${e.to}

<br>

必要Lv:${e.needLv}

<br><br>

<button onclick="evolve('${e.from}')">

進化

</button>

</div>

`;

});

}

function evolve(name){

let evo=
evolutions.find(
x=>x.from===name
);

if(!evo)return;

let data=
gameData.chars[name];

if(data.lv<evo.needLv)return;

delete gameData.chars[name];

charList.push({

name:evo.to,
multi:evo.multi,
rarity:evo.rarity,
img:evo.img

});

gameData.chars[evo.to]={
count:1,
lv:1,
exp:0
};

gameData.collection[evo.to]=true;

showEffect(
evo.to+" に進化!"
);

renderEvolution();

update();

}

// ====================
// 転生
// ====================

function rebirth(){

if(gameData.coins<10000)return;

let gain=
Math.floor(
gameData.coins/10000
);

gameData.rp+=gain;

gameData.coins=0;

gameData.chars={};

gameData.party=[];

showEffect(
"転生! +"+gain+"RP"
);

update();

}

// ====================
// 管理者
// ====================

function openAdmin(){

let code=
adminCode.value;

if(code!==ADMIN_CODE){

alert("コードが違います");

return;

}

adminUI.style.display="flex";

adminCharSelect.innerHTML="";

charList.forEach(c=>{

adminCharSelect.innerHTML+=`

<option value="${c.name}">
${c.name}
</option>

`;

});

}

function closeAdmin(){

adminUI.style.display="none";

}

function addCoinsAdmin(){

gameData.coins+=
Number(addCoinValue.value);

update();

}

function addRPAdmin(){

gameData.rp+=
Number(addRPValue.value);

update();

}

function giveCharAdmin(){

let n=
adminCharSelect.value;

let c=
charList.find(x=>x.name===n);

addChar(c);

update();

}

// ====================
// 自動収入
// ====================

setInterval(()=>{

gameData.coins+=rpUp.auto*2;

update();

},1000);

// ====================
// キャラ詳細
// ====================

let currentDetail=null;

function openDetail(name){

currentDetail=name;

detailUI.style.display="flex";

renderDetail();

}

function closeDetail(){

detailUI.style.display="none";

}

function renderDetail(){

let data=
gameData.chars[currentDetail];

let d=
charList.find(
x=>x.name===currentDetail
);

if(!data)return;

let rarityCost=1;

if(d.rarity==="R") rarityCost=2;
if(d.rarity==="SR") rarityCost=5;
if(d.rarity==="LR") rarityCost=12;
if(d.rarity==="SECRET") rarityCost=50;

let coinCost=
Math.floor(
100*
data.lv*
rarityCost
);

let rpCost=
Math.max(
1,
Math.floor(data.lv/5)
*
rarityCost
);

detailContent.innerHTML=`

<div class="card ${d.rarity}">

<img
src="${d.img}"
style="
width:150px;
height:150px;
"
>

<h2>${d.name}</h2>

<p>
レア度:${d.rarity}
</p>

<p>
Lv:${data.lv}
</p>

<p>
EXP:
${data.exp}/${data.lv*5}
</p>

<p>
所持数:${data.count}
</p>

<p>
倍率:
x${(
d.multi*
(1+data.lv*0.1)
).toFixed(1)}
</p>

<hr>

<h3>コイン強化</h3>

<p>
必要コイン:
${coinCost}
</p>

<button onclick="levelUpCoin()">
レベルアップ
</button>

<hr>

<h3>RP強化</h3>

<p>
必要RP:
${rpCost}
</p>

<button onclick="levelUpRP()">
超強化
</button>

</div>

`;

}

// コイン強化
function levelUpCoin(){

let data=
gameData.chars[currentDetail];

let d=
charList.find(
x=>x.name===currentDetail
);

let rarityCost=1;

if(d.rarity==="R") rarityCost=2;
if(d.rarity==="SR") rarityCost=5;
if(d.rarity==="LR") rarityCost=12;
if(d.rarity==="SECRET") rarityCost=50;

let cost=
Math.floor(
100*
data.lv*
rarityCost
);

if(gameData.coins<cost){

alert("コイン不足");

return;

}

gameData.coins-=cost;

data.lv++;

showEffect(
d.name+" LvUP!"
);

renderDetail();

update();

}

// RP強化
function levelUpRP(){

let data=
gameData.chars[currentDetail];

let d=
charList.find(
x=>x.name===currentDetail
);

let rarityCost=1;

if(d.rarity==="R") rarityCost=2;
if(d.rarity==="SR") rarityCost=5;
if(d.rarity==="LR") rarityCost=12;
if(d.rarity==="SECRET") rarityCost=50;

let cost=
Math.max(
1,
Math.floor(data.lv/5)
*
rarityCost
);

if(gameData.rp<cost){

alert("RP不足");

return;

}

gameData.rp-=cost;

data.lv+=3;

showEffect(
d.name+" 超強化!"
);

renderDetail();

update();

}

// ====================
// 更新
// ====================

function update(){

coins.innerHTML=
Math.floor(gameData.coins);

rp.innerHTML=
gameData.rp;

info.innerHTML=
"編成:"
+gameData.party.length+"/5";

cards.innerHTML="";

for(let c in gameData.chars){

let d=
charList.find(x=>x.name===c);

let data=
gameData.chars[c];

cards.innerHTML+=`

<div
class="card ${d.rarity}"
onclick="openDetail('${c}')"
>

<img src="${d.img}">

<br>

${c}

<br>

Lv ${data.lv}

<br>

EXP:
${data.exp}/${data.lv*5}

<br>

x${data.count}

</div>

`;

}

saveGame();

}

</script>

</body>
</html>
